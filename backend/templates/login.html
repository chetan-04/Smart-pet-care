{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="card card-auth">
        <h2>Welcome back</h2>
        <p class="subtitle">Login to access your SmartPet Care dashboard.</p>

        <form method="post" class="form">
            <div class="form-group">
                <label for="username_or_email">Username or Email</label>
                <input id="username_or_email" name="username_or_email" type="text" required placeholder="Enter username or email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <p class="auth-switch">
            New to SmartPet Care?
            <a href="{{ url_for('register') }}">Create an account</a>
        </p>
    </div>
</section>
{% endblock %}
