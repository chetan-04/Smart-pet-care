{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="card card-auth">
        <h2>Create your account</h2>
        <p class="subtitle">Sign up to start managing your pet's health and care.</p>

        <form method="post" class="form">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required minlength="4" placeholder="Create a password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" required minlength="4" placeholder="Repeat your password">
            </div>

            <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>
</section>
{% endblock %}
