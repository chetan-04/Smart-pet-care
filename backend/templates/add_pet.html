{% extends "base.html" %}
{% block title %}Add Pet{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Add a new pet</h1>
    <p class="subtitle">Create a profile so SmartPet Care can tailor advice for your pet.</p>
</section>

<section class="form-section">
    <div class="card">
        <form method="post" class="form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Pet name</label>
                    <input id="name" name="name" type="text" required placeholder="Buddy">
                </div>

                <div class="form-group">
                    <label for="species">Type</label>
                    <select id="species" name="species" required>
                        <option value="">Select type</option>
                        {% for key, info in pet_types.items() %}
                            <option value="{{ key }}" data-icon="{{ info.icon }}">{{ info.icon }} {{ info.label }}</option>
                        {% endfor %}
                    </select>
                    <div id="speciesPreview" class="species-preview">
                        <span class="species-icon">🐾</span>
                        <span class="species-label">Choose a pet type to see its icon.</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="age_years">Age (in years)</label>
                    <input id="age_years" name="age_years" type="number" step="0.1" min="0" required placeholder="2.5">
                </div>

                <div class="form-group">
                    <label for="weight_kg">Weight (kg)</label>
                    <input id="weight_kg" name="weight_kg" type="number" step="0.1" min="0" required placeholder="8.0">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Save pet profile</button>
        </form>
    </div>
</section>
{% endblock %}
